workflows:
  ios-testflight:
    name: iOS TestFlight

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: 3.41.7
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.nexaibyte.nexaipos2.mobilePos

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install pods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true